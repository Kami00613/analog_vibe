{% extends 'base.html' %}

{% block content %}

<section class="auth-page auth-page-compact">
    <div class="auth-hero">
        <p class="auth-kicker">Password reset</p>
        <h1>Пароль изменён</h1>
        <p>
            Новый пароль сохранён. Теперь можно войти в аккаунт AnalogVibe.
        </p>
    </div>

    <article class="auth-card auth-card-centered">
        <div class="auth-card-head auth-card-head-centered">
            <p class="auth-number">complete</p>
            <h2>Готово</h2>
            <p>
                Сброс пароля завершён успешно.
            </p>
        </div>

        <div class="auth-neutral-box">
            <p>
                Теперь войдите в аккаунт с новым паролем.
            </p>
        </div>

        <a href="{% url 'accounts:login' %}" class="auth-button auth-button-link">
            Войти
        </a>
    </article>
</section>

{% endblock %}
