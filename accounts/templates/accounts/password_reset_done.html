{% extends 'base.html' %}

{% block content %}

<section class="auth-page auth-page-compact">
    <div class="auth-hero">
        <p class="auth-kicker">Password reset</p>
        <h1>Письмо отправлено</h1>
        <p>
            Проверьте почту и перейдите по ссылке для восстановления пароля.
        </p>
    </div>

    <article class="auth-card auth-card-centered">
        <div class="auth-card-head auth-card-head-centered">
            <p class="auth-number">step 02</p>
            <h2>Проверьте почту</h2>
            <p>
                Мы отправили письмо со ссылкой для создания нового пароля.
            </p>
        </div>

        <div class="auth-bottom auth-bottom-centered">
            <a href="{% url 'accounts:login' %}">
                Вспомнили пароль?
            </a>
        </div>
    </article>
</section>

{% endblock %}
