{% extends 'base.html' %}

{% block content %}

<section class="catalog-page">
    <div class="catalog-head">
        <h1>{{ title }}</h1>
        <p>
            Создайте виртуальную выставку для фотоархива AnalogVibe.
        </p>
    </div>

    <article class="crud-form-card">
        <form method="post" class="crud-form">
            {% csrf_token %}

            {% if form.non_field_errors %}
                <div class="form-errors">
                    {{ form.non_field_errors }}
                </div>
            {% endif %}

            {% for field in form %}
                <div class="crud-field">
                    <label for="{{ field.id_for_label }}">
                        {{ field.label }}
                    </label>

                    {{ field }}

                    <div class="crud-field-errors">
                        {{ field.errors }}
                    </div>
                </div>
            {% endfor %}

            <div class="crud-actions">
                <button type="submit" class="review-button">
                    {{ button_text }}
                </button>

                <a href="{% url 'exhibitions:exhibition_list' %}" class="text-link">
                    Отмена
                </a>
            </div>
        </form>
    </article>
</section>

{% endblock %}
